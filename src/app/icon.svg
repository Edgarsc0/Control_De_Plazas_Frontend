<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="ANAM">
  <!-- Fondo redondeado blanco para visibilidad en pestañas claras y oscuras -->
  <rect x="2" y="2" width="96" height="96" rx="22" fill="#ffffff"/>
  <rect x="2.5" y="2.5" width="95" height="95" rx="21.5" fill="none" stroke="#621f32" stroke-opacity="0.12"/>

  <!-- Isotipo ANAM -->
  <!-- Pilar izquierdo: verde institucional -->
  <rect x="18" y="18" width="20" height="64" fill="#2f5d4a"/>
  <!-- Barra superior y pilar derecho: guinda/maroon institucional -->
  <path d="M38 18 H82 V82 H62 V38 H38 Z" fill="#621f32"/>
  <!-- Diagonales: dorado institucional (plecas) -->
  <polygon points="10,26 16,26 52,82 46,82" fill="#bc955c"/>
  <polygon points="21,26 27,26 63,82 57,82" fill="#bc955c"/>
  <polygon points="32,26 38,26 74,82 68,82" fill="#bc955c"/>
</svg>
